<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Globevest Admin Login</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#160226;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}

.card{

width:100%;
max-width:420px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:24px;

}

.logo{

width:60px;
height:60px;

margin:auto;

border-radius:18px;

background:
linear-gradient(
135deg,
#FFC003,
#A43DFF
);

display:flex;
align-items:center;
justify-content:center;

color:#160226;

font-size:24px;
font-weight:800;

margin-bottom:20px;

}

h1{

color:white;

font-size:28px;

font-weight:800;

text-align:center;

margin-bottom:8px;

}

p{

color:#cbb7df;

text-align:center;

margin-bottom:25px;

}

label{

display:block;

color:#d5c8e4;

font-size:12px;

font-weight:700;

margin-bottom:8px;

letter-spacing:1px;

}

input{

width:100%;

height:58px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

background:rgba(255,255,255,.04);

color:white;

padding:0 16px;

font-size:16px;

margin-bottom:18px;

outline:none;

}

button{

width:100%;

height:60px;

border:none;

border-radius:20px;

background:
linear-gradient(
135deg,
#FFC003,
#A43DFF
);

color:#160226;

font-size:18px;

font-weight:800;

cursor:pointer;

}

#error{

margin-top:15px;

text-align:center;

color:#ff6b6b;

font-weight:700;

}

</style></head><body><div class="card"><div class="logo">
✦
</div><h1>
Admin Login
</h1><p>
Globevest Control Panel
</p><label>
USERNAME
</label><input
type="text"
id="username"

«»

<label>
PASSWORD
</label><input
type="password"
id="password"

«»

<button id="loginBtn">
Login
</button><div id="error"></div></div><script>

document
.getElementById("loginBtn")
.addEventListener(
"click",
async ()=>{

const username =
document.getElementById(
"username"
).value;

const password =
document.getElementById(
"password"
).value;

const response =
await fetch(
"/api/login",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
username,
password
})
}
);

const result =
await response.json();

if(result.success){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"/admin.html";

}else{

document.getElementById(
"error"
).innerText =
"Invalid credentials";

}

});

</script></body>
</html>
