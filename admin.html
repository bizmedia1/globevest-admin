<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Globevest Admin</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#160226;

padding:20px;

color:white;

}

.container{

max-width:500px;
margin:auto;

}

.header{

margin-bottom:30px;

}

.logo{

width:60px;
height:60px;

border-radius:18px;

background:linear-gradient(
135deg,
#FFC003,
#A43DFF
);

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:800;

color:#160226;

margin-bottom:16px;

}

h1{

font-size:30px;
font-weight:800;

margin-bottom:8px;

}

.subtitle{

color:#cbb7df;

line-height:1.5;

}

.card{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:22px;

backdrop-filter:blur(10px);

}

.field{

margin-bottom:20px;

}

label{

display:block;

margin-bottom:10px;

font-size:12px;

font-weight:700;

letter-spacing:1px;

color:#d5c8e4;

}

input{

width:100%;

height:58px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

background:rgba(255,255,255,.04);

color:white;

padding:0 16px;

font-size:16px;

outline:none;

}

input:focus{

border-color:#A43DFF;

}

button{

width:100%;

height:60px;

border:none;

border-radius:20px;

cursor:pointer;

font-size:18px;

font-weight:800;

background:
linear-gradient(
135deg,
#FFC003,
#A43DFF
);

color:#160226;

}

.status{

margin-top:18px;

text-align:center;

color:#FFC003;

font-weight:700;

}

</style></head><body><div class="container"><div class="header"><div class="logo">
✦
</div><h1>
Globevest Admin
</h1><p class="subtitle">
Manage payment details for the Globevest portal.
</p></div><div class="card"><div class="field">
<label>ACCOUNT NUMBER</label>
<input id="accountNumber">
</div><div class="field">
<label>BANK NAME</label>
<input id="bankName">
</div><div class="field">
<label>ACCOUNT NAME</label>
<input id="accountName">
</div><div class="field">
<label>TELEGRAM USERNAME</label>
<input id="telegram">
</div><button id="saveBtn">
Save Changes
</button><div class="status" id="status"></div></div></div><script>

async function loadData(){

const res =
await fetch("/api/payment");

const data =
await res.json();

document.getElementById(
"accountNumber"
).value =
data.accountNumber || "";

document.getElementById(
"bankName"
).value =
data.bankName || "";

document.getElementById(
"accountName"
).value =
data.accountName || "";

document.getElementById(
"telegram"
).value =
data.telegram || "";

}

loadData();

document
.getElementById("saveBtn")
.addEventListener("click",
async ()=>{

const status =
document.getElementById(
"status"
);

status.innerText =
"Saving...";

const response =
await fetch(
"/api/save-payment",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({

accountNumber:
document.getElementById(
"accountNumber"
).value,

bankName:
document.getElementById(
"bankName"
).value,

accountName:
document.getElementById(
"accountName"
).value,

telegram:
document.getElementById(
"telegram"
).value

})
}
);

const result =
await response.json();

if(result.success){

status.innerText =
"Saved Successfully ✓";

}else{

status.innerText =
"Save Failed";

  }

});

</script></body>
</html>
